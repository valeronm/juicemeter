; PlatformIO Project Configuration File

[env:esp32-c3-devkitc-02]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/Bodmer/TFT_eSPI.git
    robtillaart/INA226@^0.6.0
    ; ESP32Async fork is the maintained successor of me-no-dev's libs
    ; and is known-good on Arduino-ESP32 3.x / IDF 5.x.
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git

build_flags =
    ; --- USB CDC for Serial (ESP32-C3 supermini, no UART chip) ---
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- TFT_eSPI configuration (ST7789 320x172) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DCGRAM_OFFSET=1
    -DTFT_RGB_ORDER=TFT_BGR
    ; Pins (ESP32-C3 supermini)
    -DTFT_MISO=-1
    -DTFT_MOSI=6
    -DTFT_SCLK=5
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=7
    -DTFT_BL=10
    -DTFT_BACKLIGHT_ON=HIGH
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; SPI
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
